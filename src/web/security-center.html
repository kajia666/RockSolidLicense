<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RockSolidLicense Security Center</title>
    <style>
      :root {
        --bg: #f4efe4;
        --surface: rgba(255, 252, 246, 0.94);
        --line: rgba(23, 32, 27, 0.1);
        --ink: #17201b;
        --muted: #617066;
        --accent: #0f7c68;
        --danger: #a0422c;
        --accent-soft: rgba(15, 124, 104, 0.12);
        --danger-soft: rgba(160, 66, 44, 0.12);
        --shadow: 0 24px 58px rgba(54, 49, 42, 0.14);
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "Bahnschrift", "Segoe UI Variable", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(15, 124, 104, 0.15), transparent 24%),
          radial-gradient(circle at bottom right, rgba(201, 126, 78, 0.16), transparent 28%),
          linear-gradient(135deg, #f4ede0 0%, #f8f4ed 52%, #efe5d5 100%);
      }
      code, pre { font-family: "Cascadia Code", "Consolas", monospace; }
      .shell { width: min(1320px, calc(100vw - 28px)); margin: 20px auto 36px; display: grid; gap: 18px; }
      .hero, .card { background: var(--surface); border: 1px solid var(--line); border-radius: 24px; box-shadow: var(--shadow); }
      .hero, .card { padding: 20px; }
      .hero { display: grid; gap: 10px; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 18px; }
      h1, h2, p { margin: 0; }
      h1 { font-size: clamp(28px, 5vw, 44px); }
      h2 { font-size: 20px; }
      .sub, .hint { color: var(--muted); line-height: 1.6; }
      .hint { font-size: 13px; }
      label { display: grid; gap: 8px; color: var(--muted); font-size: 14px; }
      input, select, textarea {
        width: 100%;
        padding: 12px 14px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.82);
        color: var(--ink);
        font: inherit;
      }
      textarea { min-height: 110px; resize: vertical; }
      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 16px;
        color: white;
        background: var(--ink);
        font: inherit;
        cursor: pointer;
      }
      button.secondary { background: var(--accent); }
      button.danger { background: var(--danger); }
      .actions { display: flex; flex-wrap: wrap; gap: 10px; }
      .status { padding: 12px 14px; border-radius: 14px; background: var(--accent-soft); color: var(--accent); font-size: 13px; }
      .status.warn { background: var(--danger-soft); color: var(--danger); }
      .table-wrap { overflow: auto; border: 1px solid var(--line); border-radius: 18px; background: rgba(255, 255, 255, 0.78); }
      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th, td { padding: 12px 14px; border-bottom: 1px solid rgba(23, 32, 27, 0.08); text-align: left; vertical-align: top; }
      th { background: rgba(247, 243, 235, 0.96); color: var(--muted); }
      tbody tr { cursor: pointer; }
      tbody tr:hover { background: rgba(15, 124, 104, 0.06); }
      .tag { display: inline-block; padding: 4px 8px; border-radius: 999px; background: rgba(23, 32, 27, 0.08); color: var(--muted); }
      .tag.ok { background: var(--accent-soft); color: var(--accent); }
      .tag.danger { background: var(--danger-soft); color: var(--danger); }
      pre {
        margin: 0;
        min-height: 220px;
        padding: 16px;
        border-radius: 18px;
        background: #101715;
        color: #eef7f2;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <h1>Security Center</h1>
        <p class="sub">这里专门管理 IP / CIDR 访问规则。适合做登录限流前的硬拦截、异常地区封禁、恶意 IP 清洗和临时防刷封禁。</p>
        <div class="hint">入口：<code>/admin/security</code>。当前版本支持基于 IP/CIDR 的阻断规则，作用到注册、充值、登录、心跳或全部动作。</div>
      </section>

      <section class="grid">
        <article class="card">
          <h2>管理员登录</h2>
          <label>用户名<input id="username" value="admin" /></label>
          <label>密码<input id="password" type="password" value="ChangeMe!123" /></label>
          <div class="actions">
            <button id="login-btn">登录</button>
            <button class="secondary" id="refresh-btn">刷新规则</button>
          </div>
          <div class="status" id="status-box">等待登录。</div>
        </article>

        <article class="card">
          <h2>创建规则</h2>
          <label>产品代号<input id="product-code" placeholder="留空表示全局规则" /></label>
          <label>
            目标类型
            <select id="target-type">
              <option value="ip">ip</option>
              <option value="cidr">cidr</option>
            </select>
          </label>
          <label>匹配值<input id="pattern" placeholder="例如：127.0.0.1 或 192.168.1.0/24" /></label>
          <label>
            作用动作
            <select id="action-scope">
              <option value="all">all</option>
              <option value="register">register</option>
              <option value="recharge">recharge</option>
              <option value="login">login</option>
              <option value="heartbeat">heartbeat</option>
            </select>
          </label>
          <label>
            初始状态
            <select id="rule-status">
              <option value="active">active</option>
              <option value="archived">archived</option>
            </select>
          </label>
          <label>备注<textarea id="notes" placeholder="例如：短时间内多次异常登录，临时封禁 24 小时。"></textarea></label>
          <button class="secondary" id="create-btn">创建规则</button>
        </article>

        <article class="card">
          <h2>规则状态</h2>
          <label>规则 ID<input id="rule-id" placeholder="点击下方表格自动填充" /></label>
          <label>
            目标状态
            <select id="update-status">
              <option value="active">active</option>
              <option value="archived">archived</option>
            </select>
          </label>
          <button class="danger" id="update-btn">更新状态</button>
          <div class="hint">临时规则过期后建议归档，而不是直接删除，这样审计记录会更完整。</div>
        </article>
      </section>

      <section class="card">
        <h2>规则列表</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>匹配值</th>
                <th>产品</th>
                <th>类型</th>
                <th>动作</th>
                <th>状态</th>
                <th>创建时间</th>
              </tr>
            </thead>
            <tbody id="rule-body"></tbody>
          </table>
        </div>
      </section>

      <section class="card">
        <h2>接口输出</h2>
        <pre id="output">等待操作结果…</pre>
      </section>
    </main>

    <script>
      let adminToken = "";

      function el(id) { return document.getElementById(id); }

      function setStatus(message, warn = false) {
        const box = el("status-box");
        box.textContent = message;
        box.className = `status${warn ? " warn" : ""}`;
      }

      function setOutput(value) {
        el("output").textContent = JSON.stringify(value, null, 2);
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function formatTime(value) {
        if (!value) return "—";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return String(value);
        return date.toLocaleString("zh-CN", { hour12: false });
      }

      function renderTag(value) {
        const text = String(value ?? "unknown");
        const className = text === "active" ? "tag ok" : text === "archived" ? "tag danger" : "tag";
        return `<span class="${className}">${escapeHtml(text)}</span>`;
      }

      async function callApi(path, options = {}) {
        const headers = { ...(options.headers || {}) };
        if (options.body) headers["Content-Type"] = "application/json";
        if (adminToken) headers.Authorization = `Bearer ${adminToken}`;

        const response = await fetch(path, { ...options, headers });
        const json = await response.json();
        if (!response.ok || !json.ok) {
          throw new Error(json.error?.message || `Request failed: ${response.status}`);
        }
        return json.data;
      }

      function renderRules(items) {
        if (!items.length) {
          el("rule-body").innerHTML = `<tr><td colspan="6">暂无规则。</td></tr>`;
          return;
        }

        el("rule-body").innerHTML = items.map((item) => `
          <tr data-id="${escapeHtml(item.id)}">
            <td><strong>${escapeHtml(item.pattern)}</strong><div>${escapeHtml(item.notes || "")}</div></td>
            <td>${escapeHtml(item.productCode || "GLOBAL")}</td>
            <td>${escapeHtml(item.targetType)}</td>
            <td>${escapeHtml(item.actionScope)}</td>
            <td>${renderTag(item.status)}</td>
            <td>${escapeHtml(formatTime(item.createdAt))}</td>
          </tr>
        `).join("");

        for (const row of el("rule-body").querySelectorAll("tr")) {
          row.addEventListener("click", () => {
            el("rule-id").value = row.dataset.id || "";
            setStatus("已带入规则 ID，可以直接调整状态。");
          });
        }
      }

      async function loadRules() {
        const data = await callApi("/api/admin/network-rules");
        renderRules(data.items);
        setOutput(data);
        setStatus(`规则列表已刷新，共 ${data.total} 条。`);
      }

      async function guarded(action) {
        try {
          await action();
        } catch (error) {
          setOutput({ error: error.message });
          setStatus(error.message, true);
        }
      }

      el("login-btn").addEventListener("click", () => guarded(async () => {
        const data = await callApi("/api/admin/login", {
          method: "POST",
          body: JSON.stringify({
            username: el("username").value,
            password: el("password").value
          })
        });
        adminToken = data.token;
        setOutput(data);
        setStatus(`已登录管理员 ${data.admin.username}。`);
        await loadRules();
      }));

      el("refresh-btn").addEventListener("click", () => guarded(loadRules));

      el("create-btn").addEventListener("click", () => guarded(async () => {
        const data = await callApi("/api/admin/network-rules", {
          method: "POST",
          body: JSON.stringify({
            productCode: el("product-code").value,
            targetType: el("target-type").value,
            pattern: el("pattern").value,
            actionScope: el("action-scope").value,
            status: el("rule-status").value,
            notes: el("notes").value
          })
        });
        setOutput(data);
        el("rule-id").value = data.id;
        setStatus(`规则已创建：${data.pattern}`);
        await loadRules();
      }));

      el("update-btn").addEventListener("click", () => guarded(async () => {
        const ruleId = el("rule-id").value.trim();
        if (!ruleId) throw new Error("请先输入规则 ID。");
        const data = await callApi(`/api/admin/network-rules/${encodeURIComponent(ruleId)}/status`, {
          method: "POST",
          body: JSON.stringify({
            status: el("update-status").value
          })
        });
        setOutput(data);
        setStatus(`规则状态已更新为 ${data.status}。`);
        await loadRules();
      }));

      renderRules([]);
    </script>
  </body>
</html>
