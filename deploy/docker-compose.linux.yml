services:
  rocksolidlicense:
    build:
      context: ..
      dockerfile: Dockerfile
    image: rocksolidlicense:local
    container_name: rocksolidlicense
    restart: unless-stopped
    env_file:
      - ./rocksolid.env
    volumes:
      - ../data:/var/lib/rocksolid/data
    ports:
      - "3000:3000"
      - "4000:4000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  nginx:
    image: nginx:1.27-alpine
    container_name: rocksolidlicense-nginx
    depends_on:
      rocksolidlicense:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./nginx/rocksolid.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"

networks:
  default:
    name: rocksolidlicense-net
